version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: portfolio_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./portfolio-laravel:/var/www/laravel
      - ./Docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./Docker/nginx/certs:/etc/nginx/certs
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - php
      - mysql
      - nextjs
    networks:
      - portfolio_network
    environment:
      - VIRTUAL_HOST=mirzaredzic.hopto.org
      - VIRTUAL_PORT=80

  php:
    image: php_portfolio:latest  
    build:
      context: ./portfolio-laravel
      dockerfile: Dockerfile
    container_name: portfolio_php
    restart: unless-stopped
    volumes:
      - ./portfolio-laravel:/var/www/laravel
      - ./Docker/php8.3/custom-php.ini:/usr/local/etc/php/conf.d/custom-php.ini
    networks:
      - portfolio_network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  mysql:
    image: mysql:8.0
    container_name: portfolio_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: portfolio
      MYSQL_ROOT_PASSWORD: root
      TZ: Europe/Sarajevo
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Docker/mysql/my.cnf:/etc/mysql/my.cnf
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - portfolio_network

  nextjs:
    image: nextjs_portfolio:latest  
    build:
      context: ./portfolio-next
      dockerfile: Dockerfile
    container_name: portfolio_nextjs
    restart: unless-stopped
    volumes:
      - ./portfolio-next:/app 
      - /app/node_modules  
      - /app/.next 
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://mirzaredzic.hopto.org/api
    networks:
      - portfolio_network
    expose:
      - "3000"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"


  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup --label-enable
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge

volumes:
  mysql_data: