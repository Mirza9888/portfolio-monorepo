services:
  nginx:
    image: nginx:alpine
    container_name: portfolio_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./portfolio-laravel:/var/www/laravel
      - ./Docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./Docker/nginx/certs:/etc/nginx/certs
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - php
      - mysql
      - nextjs
    networks:
      - portfolio_network
      

  php:
    build:
      context: ./portfolio-laravel
      dockerfile: Dockerfile
    container_name: portfolio_php
    volumes:
      - ./portfolio-laravel:/var/www/laravel
      - ./Docker/php8.3/custom-php.ini:/usr/local/etc/php/conf.d/custom-php.ini
    networks:
      - portfolio_network

  mysql:
    image: mysql:8.0
    container_name: portfolio_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: portfolio
      MYSQL_ROOT_PASSWORD: root
      TZ: Europe/Sarajevo
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Docker/mysql/my.cnf:/etc/mysql/my.cnf
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - portfolio_network

  nextjs:
    build:
      context: ./portfolio-next
      dockerfile: Dockerfile
    container_name: portfolio_nextjs
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://mirzaredzic.hopto.org/api
    networks:
      - portfolio_network
    expose:
      - "3000" # expose interno 3000 port, nginx ce mu pristupiti preko docker networka

networks:
  portfolio_network:
    driver: bridge

volumes:
  mysql_data:
