# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name mirzaredzic.hopto.org;

    root /home/redzicm89/portfolio-monorepo/portfolio-laravel/public;
    index index.php index.html;
    client_max_body_size 25M;

    ssl_certificate /etc/letsencrypt/live/mirzaredzic.hopto.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mirzaredzic.hopto.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # GZIP kompresija
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_vary on;

    # Laravel API i generalna pravila
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Obrada PHP fajlova
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass portfolio_php:9000; # <-- OVDE docker php-fpm container naziv i port
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
    }

    # Laravel Storage - javni fajlovi
    location /storage/ {
        alias /home/redzicm89/portfolio-monorepo/portfolio-laravel/storage/app/public/;
        access_log off;
        log_not_found off;
        expires max;
        add_header Cache-Control public;
    }

    # Next.js aplikacija (proksi)
    location /next/ {
        proxy_pass http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}

# HTTP server - redirekcija na HTTPS
server {
    listen 80;
    server_name mirzaredzic.hopto.org;
    return 301 https://$server_name$request_uri;
}
