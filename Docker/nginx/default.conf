# HTTPS server
server {
    listen 443 ssl http2;
    server_name mirzaredzic.hopto.org;

    root /var/www/next;
    index index.html;
    client_max_body_size 25M;

    ssl_certificate /etc/letsencrypt/live/mirzaredzic.hopto.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mirzaredzic.hopto.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # GZIP kompresija
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;
    gzip_vary on;

    location /api {
    root /var/www/laravel/public;
    try_files $uri $uri/ /index.php?$query_string;
}

location ~ ^/api/.*\.php$ {
    root /var/www/laravel/public;
    fastcgi_pass php:9000;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    fastcgi_param PATH_INFO $fastcgi_path_info;
}


    # Laravel Storage
    location /storage/ {
        alias /var/www/laravel/storage/app/public/;
        access_log off;
        log_not_found off;
        expires max;
        add_header Cache-Control public;
    }

    # Next.js aplikacija
    location / {
        proxy_pass http://portfolio_nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTP server - redirekcija na HTTPS
server {
    listen 80;
    server_name mirzaredzic.hopto.org;
    return 301 https://$server_name$request_uri;
}
